<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TyreXpert Pro</title>
    <style>
        :root {
            --red: #e63946;
            --red-dark: #c0392b;
            --white: #ffffff;
            --light-gray: #f8f9fa;
            --dark-text: #1e272e;
            --shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: var(--light-gray);
            color: var(--dark-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* Main App Container */
        .app {
            width: 100%;
            max-width: 480px;
            height: 95vh;
            background: var(--white);
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #e63946, #c0392b);
            padding: 20px 24px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 12px rgba(230,57,70,0.3);
        }
        .header .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .header .logo span {
            font-weight: 300;
        }
        .header .admin-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .header .admin-btn:active {
            background: rgba(255,255,255,0.4);
        }

        /* Screen Area */
        .screen {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
            animation: fade 0.3s ease;
        }
        .screen.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-red {
            background: var(--red);
            color: white;
            box-shadow: 0 6px 15px rgba(230,57,70,0.3);
        }
        .btn-white {
            background: white;
            color: var(--red);
            border: 2px solid var(--red);
        }
        .btn-dark {
            background: #1e272e;
            color: white;
        }
        .btn-green {
            background: #2ecc71;
            color: white;
        }
        .btn:active {
            transform: scale(0.97);
        }

        /* Shop Cards */
        .shop-card {
            background: white;
            border: 2px solid #eee;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .shop-card:active {
            border-color: var(--red);
            box-shadow: 0 5px 15px rgba(230,57,70,0.15);
        }

        /* Stock Item */
        .stock-item {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 3px 10px rgba(0,0,0,0.03);
            border-left: 5px solid var(--red);
        }
        .stock-qty {
            background: #fce4e4;
            color: var(--red);
            font-weight: 800;
            font-size: 1.4rem;
            padding: 8px 16px;
            border-radius: 12px;
            min-width: 65px;
            text-align: center;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .qty-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-minus { background: var(--red); }
        .qty-plus { background: #2ecc71; }

        /* Chatbot Floating Button */
        .chatbot-fab {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--red);
            color: white;
            font-size: 2rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(230,57,70,0.5);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 10px 25px rgba(230,57,70,0.4); }
            50% { box-shadow: 0 10px 35px rgba(230,57,70,0.7); }
            100% { box-shadow: 0 10px 25px rgba(230,57,70,0.4); }
        }

        /* Chatbot Panel */
        .chat-panel {
            position: fixed;
            bottom: 100px;
            right: 25px;
            width: 380px;
            max-width: 90vw;
            height: 520px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 200;
        }
        .chat-header {
            background: var(--red);
            color: white;
            padding: 16px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .msg.user {
            background: var(--red);
            color: white;
            align-self: flex-end;
        }
        .msg.bot {
            background: #e9e9e9;
            color: #1e272e;
            align-self: flex-start;
        }
        .chat-input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #eee;
            background: white;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #eee;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
        }
        .chat-input-area button {
            margin-left: 10px;
            background: var(--red);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
        }
        .voice-btn {
            background: #e74c3c;
            margin-right: 6px;
        }
        .quick-replies {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 8px 16px;
            background: white;
            border-top: 1px solid #eee;
        }
        .quick-btn {
            background: #fce4e4;
            color: var(--red);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Search bar */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #eee;
            border-radius: 30px;
            font-size: 1rem;
        }
        .mic-btn {
            background: var(--red);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.3rem;
        }

        /* Attendance alert */
        .low-stock-alert {
            background: #ffdddd;
            border: 2px solid var(--red);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 15px;
            color: #b91c1c;
            font-weight: bold;
            display: none;
        }

        /* Admin Modal */
        .admin-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 300;
            display: none;
            overflow-y: auto;
            padding: 20px;
        }
        .admin-modal .close-btn {
            position: sticky;
            top: 10px;
            float: right;
            background: var(--red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="logo">Tyre<span>Xpert</span></div>
        <button class="admin-btn" onclick="openAdmin()">👑</button>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard" class="screen active">
        <h3 style="margin-bottom:15px;">🏆 टॉप कर्मचारी</h3>
        <div id="leaderboard" style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;"></div>
        <button class="btn btn-green" onclick="punchIn()">📍 हाजिरी लगाएं</button>
        <h2 style="margin:20px 0 10px;">दुकान चुनें</h2>
        <div class="shop-card" onclick="openShop('Petrol Pump')">
            <strong>⛽ पेट्रोल पंप</strong>
        </div>
        <div class="shop-card" onclick="openShop('Khusboo Parking')">
            <strong>🅿️ खुशबू पार्किंग</strong>
        </div>
    </div>

    <!-- Inventory Screen -->
    <div id="inventory" class="screen">
        <button class="btn btn-white" style="margin-bottom:20px;" onclick="goBack()">🔙 पीछे</button>
        <h3 id="shopTitle" style="margin-bottom:15px;"></h3>
        <div class="low-stock-alert" id="lowStockAlert">
            ⚠️ कम स्टॉक: <span id="lowStockList"></span>
        </div>
        <button class="btn btn-white" style="margin-bottom:15px;" onclick="sendWhatsAppAlert()">📱 WhatsApp अलर्ट</button>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 खोजें..." oninput="filterStock()">
            <button class="mic-btn" onclick="voiceSearch()">🎤</button>
        </div>
        <div id="stockContainer"></div>
    </div>

    <!-- Admin Modal -->
    <div id="adminModal" class="admin-modal">
        <button class="close-btn" onclick="closeAdmin()">❌ बंद करें</button>
        <h2>👑 एडमिन पैनल (Pass: 1234)</h2>
        <div style="margin:20px 0;">
            <h3>स्टॉक अपडेट</h3>
            <input type="text" id="adminSearch" placeholder="प्रोडक्ट खोजें" oninput="adminSearch()">
            <div id="adminSearchResult"></div>
            <div id="selectedProduct" style="display:none; margin-top:10px;"></div>
        </div>
        <!-- Add/Delete product, staff management etc. (shorter version) -->
        <button class="btn btn-red" onclick="addProduct()">➕ नया प्रोडक्ट</button>
        <input type="text" id="newName" placeholder="प्रोडक्ट नाम">
        <button class="btn btn-dark" onclick="deleteProduct()">🗑️ प्रोडक्ट हटाएं</button>
        <select id="deleteSelect"></select>
        <hr>
        <h3>स्टाफ मैनेजमेंट</h3>
        <select id="staffSelect"></select>
        <input type="number" id="staffScore" placeholder="नए पॉइंट्स">
        <button class="btn btn-red" onclick="updateStaffScore()">अपडेट स्कोर</button>
        <hr>
        <button class="btn btn-dark" onclick="transferStock()">🔄 ट्रांसफर</button>
        <button class="btn btn-red" onclick="claimDefect()">🛑 डिफेक्ट</button>
        <button class="btn btn-white" onclick="updatePasswords()">🔑 पासवर्ड बदलें</button>
    </div>
</div>

<!-- Chatbot FAB & Panel -->
<button class="chatbot-fab" onclick="toggleChat()">💬</button>
<div class="chat-panel" id="chatPanel">
    <div class="chat-header">
        <span>🤖 AI Tyre Expert</span>
        <button onclick="toggleChat()" style="background:none;border:none;color:white;font-size:1.2rem;">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="msg bot">नमस्ते! मैं tyre का एक्सपर्ट हूँ। पूछो कुछ भी।</div>
    </div>
    <div class="quick-replies" id="quickReplies">
        <button class="quick-btn" onclick="quickReply('3.00-18 का स्टॉक')">3.00-18 स्टॉक</button>
        <button class="quick-btn" onclick="quickReply('i20 का टायर')">i20 टायर</button>
        <button class="quick-btn" onclick="quickReply('rim लीक सलूशन')">rim लीक</button>
    </div>
    <div class="chat-input-area">
        <button class="voice-btn" onclick="startVoice()">🎤</button>
        <input type="text" id="chatInput" placeholder="पूछो..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyApY09CHspm5TVxXTVvjnfB6lzwQ7nqltE",
    authDomain: "staff-managemant.firebaseapp.com",
    databaseURL: "https://staff-managemant-default-rtdb.firebaseio.com",
    projectId: "staff-managemant",
    storageBucket: "staff-managemant.firebasestorage.app",
    messagingSenderID: "160818771446",
    appId: "1:160818771446:web:e55f1bfc308c504efb03d7"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const OPENROUTER_KEY = "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";

window.settings = { appPin: "308913", adminPin: "1234" };
window.staffList = {};
window.inventory = {};
window.currentShop = "";
window.isAdminLoggedIn = false;
window.myStaffId = localStorage.getItem("tx_staff_id") || "staff_default";

const SHOPS = { PP: { name: "Petrol Pump" }, KP: { name: "Khusboo Parking" } };

// Firebase listeners
onValue(ref(db, 'settings'), (s) => { if(s.exists()) window.settings = s.val(); });
onValue(ref(db, 'staffList'), (s) => { window.staffList = s.val() || {}; renderLeaderboard(); });
onValue(ref(db, 'inventory'), (s) => { window.inventory = s.val() || {}; renderStock(); });

// Screen management
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
window.goBack = () => showScreen('dashboard');
window.openShop = (shop) => { window.currentShop = shop; document.getElementById('shopTitle').innerText = shop; showScreen('inventory'); };

// Leaderboard
function renderLeaderboard() {
    let html = '';
    Object.entries(window.staffList).sort((a,b) => b[1].score - a[1].score).forEach(([id, s], i) => {
        html += `<div style="text-align:center; min-width:80px;">
            <img src="${s.img}" style="width:50px;height:50px;border-radius:50%;border:2px solid ${i===0?'#f1c40f':'#ddd'};">
            <div style="font-size:0.8rem; font-weight:bold;">${s.name}</div>
            <div style="color:var(--red); font-weight:bold;">${s.score} pts</div>
        </div>`;
    });
    document.getElementById('leaderboard').innerHTML = html || '<p>कोई स्टाफ नहीं</p>';
}

// Punch In
window.punchIn = () => {
    if (!navigator.geolocation) return alert("GPS नहीं");
    navigator.geolocation.getCurrentPosition(pos => {
        const shop = pos.coords.latitude > 28.7 ? "Petrol Pump" : "Khusboo Parking";
        const staff = window.staffList[window.myStaffId] || { name: "Staff" };
        set(ref(db, 'attendanceLog/' + Date.now()), {
            staff: staff.name, shop, time: new Date().toLocaleTimeString('hi-IN'), timestamp: Date.now()
        });
        alert("✅ हाजिरी दर्ज - " + shop);
    });
};

// Render Stock with +/- buttons (admin only)
function renderStock() {
    const container = document.getElementById('stockContainer');
    if (!container) return;
    let html = '';
    const lowItems = [];
    Object.entries(window.inventory).forEach(([key, item]) => {
        const qty = window.currentShop === 'Petrol Pump' ? (item.pp || 0) : (item.kp || 0);
        if (qty < 5 && qty >= 0) lowItems.push(`${item.name} (${qty})`);
        html += `<div class="stock-item">
            <div><strong>${item.name}</strong> ${item.alts ? '<br><small>Alt: '+item.alts.join(',')+'</small>' : ''}</div>
            <div class="qty-control">
                ${window.isAdminLoggedIn ? `<button class="qty-btn qty-minus" onclick="adjustStock('${key}', -1)">−</button>` : ''}
                <div class="stock-qty">${qty}</div>
                ${window.isAdminLoggedIn ? `<button class="qty-btn qty-plus" onclick="adjustStock('${key}', 1)">+</button>` : ''}
            </div>
        </div>`;
    });
    container.innerHTML = html || '<p>कोई प्रोडक्ट नहीं</p>';
    const alertBox = document.getElementById('lowStockAlert');
    if (lowItems.length && document.getElementById('searchInput').value === '') {
        alertBox.style.display = 'block';
        document.getElementById('lowStockList').innerText = lowItems.join(', ');
    } else {
        alertBox.style.display = 'none';
    }
}
window.adjustStock = (key, change) => {
    if (!window.isAdminLoggedIn) return alert("सिर्फ एडमिन");
    const item = window.inventory[key];
    if (window.currentShop === 'Petrol Pump') item.pp = Math.max(0, (item.pp||0) + change);
    else item.kp = Math.max(0, (item.kp||0) + change);
    if (change < 0) item.sold = (item.sold||0) + 1;
    set(ref(db, 'inventory/' + key), item);
};
window.filterStock = () => {
    const query = document.getElementById('searchInput').value.toLowerCase();
    // simple filter implementation
};

// WhatsApp alert
window.sendWhatsAppAlert = () => {
    const low = Object.entries(window.inventory).filter(([k,i]) => (i.pp||0)<5 || (i.kp||0)<5);
    if (!low.length) return alert("सब ठीक");
    window.open(`https://wa.me/919068749268?text=${encodeURIComponent('कम स्टॉक:\n'+low.map(([k,i])=>`${i.name}: PP${i.pp||0} KP${i.kp||0}`).join('\n'))}`);
};

// Chatbot AI
async function askAI(question) {
    const stockCtx = Object.entries(window.inventory).map(([k,i]) => `${i.name}: PP${i.pp||0} KP${i.kp||0}`).join('\n');
    const prompt = `You are a tyre expert. Answer in Hinglish (Hindi + English mix) very concisely (2-3 short sentences). Be accurate and helpful. Current shop stock: ${stockCtx}. User: ${question}`;
    try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method:"POST",
            headers: {
                "Authorization": `Bearer ${OPENROUTER_KEY}`,
                "Content-Type": "application/json",
                "HTTP-Referer": "https://tyrexpert.app",
                "X-Title": "TyreXpert"
            },
            body: JSON.stringify({
                model: "openai/gpt-4o-mini",
                messages: [{ role: "system", content: prompt }, { role: "user", content: question }],
                temperature: 0.5, max_tokens: 100
            })
        });
        const data = await res.json();
        return data.choices?.[0]?.message?.content || "कोई जवाब नहीं मिला।";
    } catch (e) {
        return "AI सर्वर से कनेक्ट नहीं हो पाया।";
    }
}

window.sendMessage = async () => {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    appendMessage(msg, 'user');
    input.value = '';
    appendMessage('...', 'bot');
    const reply = await askAI(msg);
    document.getElementById('chatMessages').lastChild.remove();
    appendMessage(reply, 'bot');
};
window.quickReply = (text) => { document.getElementById('chatInput').value = text; sendMessage(); };
function appendMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `msg ${sender}`;
    div.textContent = text;
    document.getElementById('chatMessages').appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
}
window.toggleChat = () => {
    const panel = document.getElementById('chatPanel');
    panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
};
window.startVoice = () => {
    const recog = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recog.lang = 'hi-IN';
    recog.start();
    recog.onresult = e => {
        document.getElementById('chatInput').value = e.results[0][0].transcript;
        sendMessage();
    };
};

// Admin functions (simplified)
window.openAdmin = () => {
    const pin = prompt("एडमिन पासवर्ड:");
    if (pin === window.settings.adminPin) {
        window.isAdminLoggedIn = true;
        document.getElementById('adminModal').style.display = 'block';
    } else alert("गलत पासवर्ड");
};
window.closeAdmin = () => {
    document.getElementById('adminModal').style.display = 'none';
    window.isAdminLoggedIn = false;
};
</script>
</body>
</html>
