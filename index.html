<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TyreXpert Stock Master</title>
    <style>
        :root { --dark: #1e272e; --red: #ff3f34; --green: #0be881; --blue: #0984e3; --bg: #f5f6fa; --card: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--dark); }

        /* General Classes */
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: white; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: var(--green); color: var(--dark); }
        .btn-red { background: var(--red); }
        .btn-dark { background: var(--dark); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #d2dae2; border-radius: 8px; font-size: 1rem; outline: none; }
        
        /* Headers */
        .top-bar { background: var(--dark); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logo { font-size: 1.5rem; font-weight: 900; font-style: italic; }
        .logo span { color: var(--red); }
        .admin-icon { font-size: 1.5rem; cursor: pointer; background: #fff; border-radius: 50%; padding: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }

        /* Screens */
        .screen { padding: 20px; max-width: 600px; margin: 0 auto; min-height: 100vh; }
        
        /* Auth Screen */
        #auth-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--dark); color: white; }
        .auth-box { background: white; color: var(--dark); padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }

        /* Leaderboard & Dashboard */
        .leaderboard { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin-bottom: 30px; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .staff-card { text-align: center; }
        .staff-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #d2dae2; }
        
        /* Rank 1 Celebration Animation */
        .rank-1 .staff-img { width: 110px; height: 110px; border: 4px solid #f1c40f; box-shadow: 0 0 20px #f1c40f; animation: celebrate 2s infinite alternate; }
        .rank-1 .badge { font-size: 2rem; display: block; margin-bottom: -15px; z-index: 10; position: relative; animation: bounce 1s infinite alternate; }
        .rank-2 .badge { font-size: 1.5rem; display: block; margin-bottom: -10px; z-index: 10; position: relative; }
        
        @keyframes celebrate { 0% { transform: scale(1); box-shadow: 0 0 10px #f1c40f; } 100% { transform: scale(1.05); box-shadow: 0 0 30px #f39c12; } }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }

        /* Inventory Screen */
        .glow-red-heading { background: #ff7675; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: 900; text-align: center; box-shadow: 0 0 15px #ff7675; animation: redGlow 1s infinite alternate; border: 2px solid #d63031; }
        @keyframes redGlow { 0% { box-shadow: 0 0 10px #ff7675; } 100% { box-shadow: 0 0 25px #d63031; } }

        .search-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-container input { margin: 0; border: 2px solid var(--blue); border-radius: 25px; padding-left: 20px; }
        .mic-btn { width: 55px; border-radius: 50%; background: var(--blue); color: white; border: none; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        .smart-alert { background: #ffeaa7; border-left: 5px solid #fdcb6e; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; color: #d35400; display: none; }

        .stock-item { background: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid var(--dark); }
        .qty-box { background: var(--bg); padding: 10px 15px; border-radius: 8px; font-size: 1.5rem; font-weight: 900; text-align: center; min-width: 60px; }
        .admin-controls { display: flex; gap: 5px; margin-top: 10px; }
        .admin-controls button { padding: 5px 10px; font-size: 0.9rem; margin: 0; width: auto; flex-grow: 1; }

        /* Admin Modal */
        #admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 20px; display: none; }
        .admin-section { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #d2dae2; }
        .admin-section h3 { margin-bottom: 15px; color: var(--dark); border-bottom: 2px solid #d2dae2; padding-bottom: 5px; }
        .close-admin { background: var(--red); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 20px; }

    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h1 class="logo" style="font-size: 2.5rem;">Tyre<span>Xpert</span></h1>
            <p style="margin: 10px 0 20px; font-weight: bold;">App Lock</p>
            <input type="password" id="appPinInput" placeholder="Password Daalein">
            <button class="btn btn-dark" onclick="login()">Enter App</button>
        </div>
    </div>

    <div id="dashboard-screen" class="screen hidden">
        <div class="top-bar" style="border-radius: 10px; margin-bottom: 20px;">
            <div class="logo">Tyre<span>Xpert</span></div>
            <div class="admin-icon" onclick="openAdminAuth()">👑</div>
        </div>

        <div class="leaderboard">
            <div class="staff-card rank-2">
                <span class="badge">🥈</span>
                <img id="rank2-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="staff-img">
                <h4 id="rank2-name" style="margin-top:10px;">Staff 2</h4>
            </div>
            <div class="staff-card rank-1">
                <span class="badge">🏆</span>
                <img id="rank1-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="staff-img">
                <h3 id="rank1-name" style="margin-top:10px; color: #d35400;">Staff 1</h3>
            </div>
        </div>

        <h2 style="text-align: center; margin-bottom: 20px;">Kahan ka stock dekhna hai?</h2>
        <button class="btn btn-dark" onclick="openShop('Petrol Pump')">⛽ Petrol Pump</button>
        <button class="btn btn-blue" onclick="openShop('Khusboo Parking')">🅿️ Khusboo Parking</button>
    </div>

    <div id="inventory-screen" class="screen hidden">
        <div class="top-bar" style="border-radius: 10px; margin-bottom: 20px;">
            <button onclick="goBack()" style="width:auto; padding:5px 10px; margin:0; border:none; border-radius:5px; background:white; color:black; font-weight:bold;">🔙 Back</button>
            <h3 id="shop-title">Shop Name</h3>
            <div class="admin-icon" onclick="openAdminAuth()">👑</div>
        </div>

        <div id="low-stock-box" class="glow-red-heading hidden">
            ⚠️ Khatam Hone Wala Maal (Qty < 5)
            <div id="low-stock-list" style="font-weight: normal; margin-top: 10px; text-align: left; font-size: 0.9rem;"></div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search tyre, tube..." oninput="handleSearch()">
            <button class="mic-btn" onclick="startMic()">🎤</button>
        </div>

        <div id="smart-alert" class="smart-alert"></div>

        <h3 style="margin-bottom: 10px;">📦 Saara Stock</h3>
        <div id="stock-list-container"></div>
    </div>

    <div id="admin-modal">
        <button class="close-admin" onclick="closeAdmin()">❌ Close Admin Panel</button>
        <h2 style="text-align: center; margin-bottom: 20px; color: var(--blue);">Admin Control Center</h2>

        <div class="admin-section">
            <h3>🛑 Defect Claim</h3>
            <select id="defectItem"></select>
            <select id="defectShop">
                <option value="Petrol Pump">Petrol Pump se minus</option>
                <option value="Khusboo Parking">Khusboo Parking se minus</option>
            </select>
            <input type="number" id="defectQty" placeholder="Kitne piece defect hain?">
            <button class="btn btn-red" onclick="claimDefect()">Defect mein daalo (Minus Stock)</button>
        </div>

        <div class="admin-section">
            <h3>➕ Naya Product Add Karo</h3>
            <input type="text" id="newName" placeholder="Product Name (e.g. 155/80 R13 CEAT)">
            <input type="text" id="newAlts" placeholder="Alternatives (e.g. 165/70 R13) - comma se alag karein">
            <div style="display: flex; gap:10px;">
                <input type="number" id="newPP" placeholder="Petrol Pump Qty">
                <input type="number" id="newKP" placeholder="Khusboo P. Qty">
            </div>
            <button class="btn btn-dark" onclick="addProduct()">Add to System</button>
        </div>

        <div class="admin-section">
            <h3>🔄 Dukaan Transfer</h3>
            <select id="transferItem"></select>
            <select id="transferDir">
                <option value="P2K">Petrol Pump ➡️ Khusboo Parking</option>
                <option value="K2P">Khusboo Parking ➡️ Petrol Pump</option>
            </select>
            <input type="number" id="transferQty" placeholder="Quantity">
            <button class="btn btn-blue" onclick="transferStock()">Transfer Maal</button>
        </div>

        <div class="admin-section">
            <h3>🏆 Update Staff Rank</h3>
            <p style="font-size:0.8rem; margin-bottom:5px;">Rank 1 (Champion)</p>
            <input type="text" id="r1Name" placeholder="Rank 1 Name">
            <input type="text" id="r1Pic" placeholder="Rank 1 Photo URL (Link)">
            
            <p style="font-size:0.8rem; margin-top:10px; margin-bottom:5px;">Rank 2</p>
            <input type="text" id="r2Name" placeholder="Rank 2 Name">
            <input type="text" id="r2Pic" placeholder="Rank 2 Photo URL (Link)">
            <button class="btn btn-green" onclick="updateLeaderboard()">Update Leaderboard</button>
        </div>

        <div class="admin-section">
            <h3>🔑 Passwords Change</h3>
            <input type="text" id="chgAppPass" placeholder="Naya App Password">
            <input type="text" id="chgAdminPass" placeholder="Naya Admin Password">
            <button class="btn btn-dark" onclick="updatePasswords()">Save Passwords</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. DATABASE SETUP (LocalStorage)
        // ==========================================
        
        let settings = JSON.parse(localStorage.getItem('tyre_set')) || { appPin: "1234", adminPin: "1234" };
        let leaderboard = JSON.parse(localStorage.getItem('tyre_ldr')) || {
            r1: { name: "Iliyas", img: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" },
            r2: { name: "Raghav", img: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" }
        };
        
        let defaultInv = [
            { id: 1, name: "155/80 R13 MRF (Alto/Swift)", pp: 2, kp: 0, alts: ["165/70 R13", "145/80 R13"] },
            { id: 2, name: "165/70 R13 Apollo", pp: 6, kp: 3, alts: ["155/80 R13"] },
            { id: 3, name: "3.00-18 Tube (Splendor)", pp: 0, kp: 5, alts: ["2.75-18", "90/90-18"] },
            { id: 4, name: "14-Inch Heavy Tube", pp: 10, kp: 12, alts: ["14-Inch Normal"] },
            { id: 5, name: "195/55 R16 (Baleno)", pp: 1, kp: 1, alts: ["185/60 R16"] }
        ];
        
        let inventory = JSON.parse(localStorage.getItem('tyre_inv')) || defaultInv;
        let defects = JSON.parse(localStorage.getItem('tyre_def')) || [];

        let currentShop = "";
        let isAdminLoggedIn = false;

        function saveData() {
            localStorage.setItem('tyre_set', JSON.stringify(settings));
            localStorage.setItem('tyre_ldr', JSON.stringify(leaderboard));
            localStorage.setItem('tyre_inv', JSON.stringify(inventory));
            localStorage.setItem('tyre_def', JSON.stringify(defects));
        }

        // ==========================================
        // 2. NAVIGATION & AUTH
        // ==========================================

        function login() {
            let pin = document.getElementById('appPinInput').value;
            if (pin === settings.appPin || settings.appPin === "") {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                renderLeaderboard();
            } else { alert("❌ Galat Password"); }
        }

        function renderLeaderboard() {
            document.getElementById('rank1-name').innerText = leaderboard.r1.name;
            document.getElementById('rank1-img').src = leaderboard.r1.img;
            document.getElementById('rank2-name').innerText = leaderboard.r2.name;
            document.getElementById('rank2-img').src = leaderboard.r2.img;
        }

        function openShop(shop) {
            currentShop = shop;
            document.getElementById('dashboard-screen').classList.add('hidden');
            document.getElementById('inventory-screen').classList.remove('hidden');
            document.getElementById('shop-title').innerText = shop;
            isAdminLoggedIn = false; // Reset admin on shop change
            document.getElementById('searchInput').value = ""; // Clear search
            document.getElementById('smart-alert').style.display = "none";
            renderInventory();
        }

        function goBack() {
            document.getElementById('inventory-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
        }

        function openAdminAuth() {
            let pin = prompt("Admin Password Daalein:");
            if (pin === settings.adminPin || settings.adminPin === "") {
                isAdminLoggedIn = true;
                populateAdminDropdowns();
                fillAdminSettings();
                document.getElementById('admin-modal').style.display = "block";
                renderInventory(); // Rerender to show +/- buttons if on inv screen
            } else if(pin) {
                alert("❌ Galat Admin Password!");
            }
        }

        function closeAdmin() {
            isAdminLoggedIn = false;
            document.getElementById('admin-modal').style.display = "none";
            renderInventory(); // Rerender to hide +/- buttons
        }

        // ==========================================
        // 3. INVENTORY & SMART SEARCH LOGIC
        // ==========================================

        function renderInventory(filterText = "") {
            const listContainer = document.getElementById('stock-list-container');
            const lowBox = document.getElementById('low-stock-box');
            const lowList = document.getElementById('low-stock-list');
            
            listContainer.innerHTML = "";
            lowList.innerHTML = "";
            let lowCount = 0;

            inventory.forEach((item, index) => {
                let qty = currentShop === 'Petrol Pump' ? item.pp : item.kp;
                
                // 1. Populate Low Stock Header (Only if no search filter is active)
                if(qty > 0 && qty < 5 && !filterText) {
                    lowCount++;
                    lowList.innerHTML += `• ${item.name} <b>(${qty} bache hain)</b><br>`;
                }

                // 2. Search Filter
                if(filterText && !item.name.toLowerCase().includes(filterText.toLowerCase())) return;

                // 3. Render Item
                let adminBtns = isAdminLoggedIn ? `
                    <div class="admin-controls">
                        <button class="btn-red" onclick="updateQty(${index}, -1)">➖ Minus</button>
                        <button class="btn-green" onclick="updateQty(${index}, 1)">➕ Add</button>
                    </div>
                ` : "";

                listContainer.innerHTML += `
                    <div class="stock-item">
                        <div style="flex-grow:1;">
                            <h4>${item.name}</h4>
                            <p>Alternatives: ${item.alts.join(", ") || "N/A"}</p>
                            ${adminBtns}
                        </div>
                        <div class="qty-box" style="color: ${qty < 5 ? 'red' : 'inherit'};">${qty}</div>
                    </div>
                `;
            });

            // Toggle Red Glow Header
            if(lowCount > 0 && !filterText) {
                lowBox.classList.remove('hidden');
            } else {
                lowBox.classList.add('hidden');
            }
        }

        function handleSearch() {
            let query = document.getElementById('searchInput').value.toLowerCase().trim();
            renderInventory(query);
            
            const alertBox = document.getElementById('smart-alert');
            alertBox.style.display = "none";

            if(query.length < 2) return;

            // SMART ASSISTANT LOGIC
            let exactMatch = inventory.find(i => i.name.toLowerCase().includes(query));
            
            if(exactMatch) {
                let myQty = currentShop === 'Petrol Pump' ? exactMatch.pp : exactMatch.kp;
                let otherQty = currentShop === 'Petrol Pump' ? exactMatch.kp : exactMatch.pp;
                let otherShop = currentShop === 'Petrol Pump' ? 'Khusboo Parking' : 'Petrol Pump';

                if(myQty === 0) {
                    let msg = `⚠️ <b>${exactMatch.name}</b> yahan khatam hai!`;
                    
                    if(otherQty > 0) {
                        msg += `<br>👉 Lekin <b>${otherShop} par ${otherQty} piece hain!</b> Jaake le aao.`;
                    } else {
                        msg += `<br>❌ Dono dukaan par khatam hai.`;
                    }

                    if(exactMatch.alts.length > 0) {
                        msg += `<br><br>💡 <b>Alternative (Iski jagah laga do):</b><br>`;
                        exactMatch.alts.forEach(altName => {
                            let altItem = inventory.find(i => i.name.toLowerCase().includes(altName.toLowerCase()));
                            if(altItem) {
                                let altQty = currentShop === 'Petrol Pump' ? altItem.pp : altItem.kp;
                                msg += `• ${altItem.name} - Yahan <b>${altQty}</b> hain.<br>`;
                            } else {
                                msg += `• ${altName}<br>`;
                            }
                        });
                    }
                    
                    alertBox.innerHTML = msg;
                    alertBox.style.display = "block";
                }
            }
        }

        function startMic() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return alert("Mic is not supported in this browser.");
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            const input = document.getElementById('searchInput');
            input.placeholder = "Sunaai de raha hai...";
            
            recognition.onresult = (e) => {
                input.value = e.results[0][0].transcript;
                handleSearch();
                input.placeholder = "Search tyre, tube...";
            };
            recognition.start();
        }

        // ==========================================
        // 4. ADMIN ACTIONS
        // ==========================================

        function populateAdminDropdowns() {
            let options = inventory.map(i => `<option value="${i.id}">${i.name}</option>`).join("");
            document.getElementById('defectItem').innerHTML = options;
            document.getElementById('transferItem').innerHTML = options;
        }

        function fillAdminSettings() {
            document.getElementById('chgAppPass').value = settings.appPin;
            document.getElementById('chgAdminPass').value = settings.adminPin;
            document.getElementById('r1Name').value = leaderboard.r1.name;
            document.getElementById('r1Pic').value = leaderboard.r1.img;
            document.getElementById('r2Name').value = leaderboard.r2.name;
            document.getElementById('r2Pic').value = leaderboard.r2.img;
        }

        function updateQty(index, change) {
            if(currentShop === 'Petrol Pump') {
                inventory[index].pp += change;
                if(inventory[index].pp < 0) inventory[index].pp = 0;
            } else {
                inventory[index].kp += change;
                if(inventory[index].kp < 0) inventory[index].kp = 0;
            }
            saveData();
            renderInventory(document.getElementById('searchInput').value);
        }

        function addProduct() {
            let name = document.getElementById('newName').value;
            let alts = document.getElementById('newAlts').value.split(',').map(s => s.trim()).filter(s => s);
            let pp = parseInt(document.getElementById('newPP').value) || 0;
            let kp = parseInt(document.getElementById('newKP').value) || 0;

            if(!name) return alert("Naam daalna zaruri hai!");
            
            inventory.push({ id: Date.now(), name, pp, kp, alts });
            saveData();
            populateAdminDropdowns();
            alert("✅ Naya Product Add ho gaya!");
            
            document.getElementById('newName').value = "";
            document.getElementById('newAlts').value = "";
            document.getElementById('newPP').value = "";
            document.getElementById('newKP').value = "";
        }

        function claimDefect() {
            let id = parseInt(document.getElementById('defectItem').value);
            let shop = document.getElementById('defectShop').value;
            let qty = parseInt(document.getElementById('defectQty').value);

            if(!qty || qty <= 0) return alert("Sahi Quantity daalein!");

            let item = inventory.find(i => i.id === id);
            
            if(shop === "Petrol Pump") {
                if(item.pp < qty) return alert("Stock mein itna maal nahi hai!");
                item.pp -= qty;
            } else {
                if(item.kp < qty) return alert("Stock mein itna maal nahi hai!");
                item.kp -= qty;
            }

            defects.push({ id: item.id, name: item.name, shop: shop, qty: qty, date: new Date().toLocaleDateString() });
            saveData();
            alert("✅ Defect claim log ho gaya aur stock minus ho gaya!");
            document.getElementById('defectQty').value = "";
        }

        function transferStock() {
            let id = parseInt(document.getElementById('transferItem').value);
            let dir = document.getElementById('transferDir').value;
            let qty = parseInt(document.getElementById('transferQty').value);

            if(!qty || qty <= 0) return alert("Quantity daalein!");
            let item = inventory.find(i => i.id === id);

            if(dir === "P2K") {
                if(item.pp < qty) return alert("Petrol Pump par itna stock nahi hai!");
                item.pp -= qty;
                item.kp += qty;
            } else {
                if(item.kp < qty) return alert("Khusboo Parking par itna stock nahi hai!");
                item.kp -= qty;
                item.pp += qty;
            }
            saveData();
            alert("✅ Transfer Success!");
            document.getElementById('transferQty').value = "";
        }

        function updateLeaderboard() {
            leaderboard.r1.name = document.getElementById('r1Name').value || "Staff 1";
            leaderboard.r1.img = document.getElementById('r1Pic').value || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
            leaderboard.r2.name = document.getElementById('r2Name').value || "Staff 2";
            leaderboard.r2.img = document.getElementById('r2Pic').value || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
            
            saveData();
            renderLeaderboard();
            alert("✅ Leaderboard Updated!");
        }

        function updatePasswords() {
            settings.appPin = document.getElementById('chgAppPass').value;
            settings.adminPin = document.getElementById('chgAdminPass').value;
            saveData();
            alert("✅ Passwords Updated!");
        }

    </script>
</body>
</html>
