<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TyreXpert Stock Master</title>
    <style>
        :root { --dark: #1e272e; --red: #ff3f34; --green: #0be881; --blue: #0984e3; --bg: #f5f6fa; --card: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--dark); }

        /* General Classes */
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: white; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: var(--green); color: var(--dark); }
        .btn-red { background: var(--red); }
        .btn-dark { background: var(--dark); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #d2dae2; border-radius: 8px; font-size: 1rem; outline: none; }
        
        /* Headers */
        .top-bar { background: var(--dark); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logo { font-size: 1.5rem; font-weight: 900; font-style: italic; }
        .logo span { color: var(--red); }
        .admin-icon { font-size: 1.5rem; cursor: pointer; background: #fff; border-radius: 50%; padding: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }

        /* Screens */
        .screen { padding: 20px; max-width: 600px; margin: 0 auto; min-height: 100vh; }
        
        /* Auth Screen */
        #auth-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--dark); color: white; }
        .auth-box { background: white; color: var(--dark); padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }

        /* Leaderboard & Dashboard */
        .leaderboard { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin-bottom: 30px; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .staff-card { text-align: center; }
        .staff-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #d2dae2; }
        
        /* Rank 1 Celebration Animation */
        .rank-1 .staff-img { width: 110px; height: 110px; border: 4px solid #f1c40f; box-shadow: 0 0 20px #f1c40f; animation: celebrate 2s infinite alternate; }
        .rank-1 .badge { font-size: 2rem; display: block; margin-bottom: -15px; z-index: 10; position: relative; animation: bounce 1s infinite alternate; }
        .rank-2 .badge { font-size: 1.5rem; display: block; margin-bottom: -10px; z-index: 10; position: relative; }
        
        @keyframes celebrate { 0% { transform: scale(1); box-shadow: 0 0 10px #f1c40f; } 100% { transform: scale(1.05); box-shadow: 0 0 30px #f39c12; } }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }

        /* Inventory Screen */
        .glow-red-heading { background: #ff7675; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: 900; text-align: center; box-shadow: 0 0 15px #ff7675; animation: redGlow 1s infinite alternate; border: 2px solid #d63031; }
        @keyframes redGlow { 0% { box-shadow: 0 0 10px #ff7675; } 100% { box-shadow: 0 0 25px #d63031; } }

        .search-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-container input { margin: 0; border: 2px solid var(--blue); border-radius: 25px; padding-left: 20px; }
        .mic-btn { width: 55px; border-radius: 50%; background: var(--blue); color: white; border: none; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        .smart-alert { background: #ffeaa7; border-left: 5px solid #fdcb6e; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; color: #d35400; display: none; line-height: 1.5; }

        .stock-item { background: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid var(--dark); }
        .qty-box { background: var(--bg); padding: 10px 15px; border-radius: 8px; font-size: 1.5rem; font-weight: 900; text-align: center; min-width: 60px; }
        .admin-controls { display: flex; gap: 5px; margin-top: 10px; }
        .admin-controls button { padding: 5px 10px; font-size: 0.9rem; margin: 0; width: auto; flex-grow: 1; }

        /* Admin Modal */
        #admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 20px; display: none; }
        .admin-section { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #d2dae2; }
        .admin-section h3 { margin-bottom: 15px; color: var(--dark); border-bottom: 2px solid #d2dae2; padding-bottom: 5px; }
        .close-admin { background: var(--red); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 20px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration (Aapka Address)
        const firebaseConfig = {
            apiKey: "AIzaSyApY09CHspm5TVxXTVvjnfB6lzwQ7nqltE",
            authDomain: "staff-managemant.firebaseapp.com",
            databaseURL: "https://staff-managemant-default-rtdb.firebaseio.com", // Aapke real-time db ka link
            projectId: "staff-managemant",
            storageBucket: "staff-managemant.firebasestorage.app",
            messagingSenderID: "160818771446",
            appId: "1:160818771446:web:e55f1bfc308c504efb03d7"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Global Variables
        let settings = { appPin: "308913", adminPin: "12345" };
        let leaderboard = {
            r1: { name: "Iliyas", img: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" },
            r2: { name: "Raghav", img: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" }
        };
        let inventory = [];
        let currentShop = "";
        let isAdminLoggedIn = false;

        // ==========================================
        // REALTIME DATABASE SYNC (Sabhi phones par data automatic update hoga)
        // ==========================================
        
        // Listen for Settings changes
        onValue(ref(db, 'settings'), (snapshot) => {
            if(snapshot.exists()) { settings = snapshot.val(); }
        });

        // Listen for Leaderboard changes
        onValue(ref(db, 'leaderboard'), (snapshot) => {
            if(snapshot.exists()) {
                leaderboard = snapshot.val();
                renderLeaderboard();
            }
        });

        // Listen for Inventory changes
        onValue(ref(db, 'inventory'), (snapshot) => {
            inventory = snapshot.exists() ? snapshot.val() : [];
            renderInventory(document.getElementById('searchInput').value.toLowerCase().trim());
            populateAdminDropdowns();
        });

        // ==========================================
        // AUTH & NAVIGATION FUNCTIONS
        // ==========================================
        window.login = function() {
            let pin = document.getElementById('appPinInput').value;
            if (pin === settings.appPin || settings.appPin === "") {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                renderLeaderboard();
            } else { alert("❌ Galat Password"); }
        }

        function renderLeaderboard() {
            document.getElementById('rank1-name').innerText = leaderboard.r1.name;
            document.getElementById('rank1-img').src = leaderboard.r1.img;
            document.getElementById('rank2-name').innerText = leaderboard.r2.name;
            document.getElementById('rank2-img').src = leaderboard.r2.img;
        }

        window.openShop = function(shop) {
            currentShop = shop;
            document.getElementById('dashboard-screen').classList.add('hidden');
            document.getElementById('inventory-screen').classList.remove('hidden');
            document.getElementById('shop-title').innerText = shop;
            isAdminLoggedIn = false; 
            document.getElementById('searchInput').value = ""; 
            document.getElementById('smart-alert').style.display = "none";
            renderInventory();
        }

        window.goBack = function() {
            document.getElementById('inventory-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
        }

        window.openAdminAuth = function() {
            let pin = prompt("Admin Password Daalein:");
            if (pin === settings.adminPin || settings.adminPin === "") {
                isAdminLoggedIn = true;
                populateAdminDropdowns();
                fillAdminSettings();
                document.getElementById('admin-modal').style.display = "block";
                renderInventory(); 
            } else if(pin) {
                alert("❌ Galat Admin Password!");
            }
        }

        window.closeAdmin = function() {
            isAdminLoggedIn = false;
            document.getElementById('admin-modal').style.display = "none";
            renderInventory(); 
        }

        // ==========================================
        // RENDER INVENTORY
        // ==========================================
        function renderInventory(filterText = "") {
            const listContainer = document.getElementById('stock-list-container');
            const lowBox = document.getElementById('low-stock-box');
            const lowList = document.getElementById('low-stock-list');
            
            listContainer.innerHTML = "";
            lowList.innerHTML = "";
            let lowCount = 0;

            if (!inventory || inventory.length === 0) {
                listContainer.innerHTML = "<p style='text-align:center; color:#7f8c8d;'>Stock empty hai. Admin panel se maal add karein.</p>";
                lowBox.classList.add('hidden');
                return;
            }

            inventory.forEach((item, index) => {
                if(!item) return; // safeguard delete item spaces
                let myQty = currentShop === 'Petrol Pump' ? parseInt(item.pp || 0) : parseInt(item.kp || 0);
                let otherQty = currentShop === 'Petrol Pump' ? parseInt(item.kp || 0) : parseInt(item.pp || 0);
                let otherShopName = currentShop === 'Petrol Pump' ? 'Khusboo Parking' : 'Petrol Pump';
                
                if(myQty > 0 && myQty < 5 && !filterText) {
                    lowCount++;
                    lowList.innerHTML += `• ${item.name} <b>(${myQty} piece)</b><br>`;
                }

                if(filterText && !item.name.toLowerCase().includes(filterText.toLowerCase())) return;

                let adminBtns = isAdminLoggedIn ? `
                    <div class="admin-controls">
                        <button class="btn-red" onclick="updateQty(${index}, -1)">➖ Minus</button>
                        <button class="btn-green" onclick="updateQty(${index}, 1)">➕ Add</button>
                    </div>
                ` : "";

                let altText = (item.alts && item.alts.length > 0) ? (Array.isArray(item.alts) ? item.alts.join(", ") : item.alts) : "Koi nahi";

                let otherShopAlert = "";
                if (myQty === 0 && otherQty > 0) {
                    otherShopAlert = `
                    <div style="background: #e8f8f5; color: #0fb9b1; padding: 5px 10px; border-radius: 5px; font-size: 0.85rem; font-weight: bold; margin-top: 5px; border-left: 3px solid #0fb9b1;">
                        👉 Yahan khatam hai, par ${otherShopName} par ${otherQty} piece hain!
                    </div>`;
                }

                listContainer.innerHTML += `
                    <div class="stock-item">
                        <div style="flex-grow:1;">
                            <h4>${item.name}</h4>
                            <p style="font-size:0.8rem; color:#7f8c8d;">Alternatives: ${altText}</p>
                            ${otherShopAlert}
                            ${adminBtns}
                        </div>
                        <div class="qty-box" style="color: ${myQty < 5 ? 'red' : 'inherit'};">${myQty}</div>
                    </div>
                `;
            });

            if(lowCount > 0 && !filterText) {
                lowBox.classList.remove('hidden');
            } else {
                lowBox.classList.add('hidden');
            }
        }

        window.handleSearch = function() {
            let query = document.getElementById('searchInput').value.toLowerCase().trim();
            renderInventory(query);
            
            const alertBox = document.getElementById('smart-alert');
            alertBox.style.display = "none";

            if(query.length < 2) return;

            let exactMatch = inventory.find(i => i && i.name.toLowerCase().includes(query));
            if(exactMatch) {
                let myQty = currentShop === 'Petrol Pump' ? exactMatch.pp : exactMatch.kp;
                let otherQty = currentShop === 'Petrol Pump' ? exactMatch.kp : exactMatch.pp;
                let otherShop = currentShop === 'Petrol Pump' ? 'Khusboo Parking' : 'Petrol Pump';

                if(myQty === 0 && otherQty > 0) {
                    alertBox.innerHTML = `⚠️ <b>${exactMatch.name}</b> yahan khatam hai!<br>👉 Lekin <b>${otherShop} par ${otherQty} piece hain!</b>`;
                    alertBox.style.display = "block";
                }
            }
        }

        // ==========================================
        // ADMIN PANELS OPERATIONS WITH FIREBASE 
        // ==========================================
        
        window.updateQty = function(index, change) {
            let item = inventory[index];
            if(currentShop === 'Petrol Pump') {
                item.pp = Math.max(0, parseInt(item.pp || 0) + change);
            } else {
                item.kp = Math.max(0, parseInt(item.kp || 0) + change);
            }
            set(ref(db, 'inventory/' + index), item);
        }

        window.addProduct = function() {
            let name = document.getElementById('newName').value.trim();
            let altsInput = document.getElementById('newAlts').value.trim();
            let ppQty = parseInt(document.getElementById('newPP').value) || 0;
            let kpQty = parseInt(document.getElementById('newKP').value) || 0;

            if(!name) { alert("Product ka naam daalna jaroori hai!"); return; }

            let alts = altsInput ? altsInput.split(',').map(s => s.trim()) : [];
            let newItem = { name: name, alts: alts, pp: ppQty, kp: kpQty };
            
            let newIndex = inventory ? inventory.length : 0;
            set(ref(db, 'inventory/' + newIndex), newItem).then(() => {
                alert("📦 Naya product add ho gaya!");
                document.getElementById('newName').value = "";
                document.getElementById('newAlts').value = "";
                document.getElementById('newPP').value = "";
                document.getElementById('newKP').value = "";
            });
        }

        window.deleteProduct = function() {
            let index = document.getElementById('deleteItemSelect').value;
            if(index === "") return;
            if(confirm("Kya aap sach me is maal ko hamesha ke liye hatana chahte hain?")) {
                inventory.splice(index, 1);
                set(ref(db, 'inventory'), inventory).then(() => { alert("🗑️ Product deleted!"); });
            }
        }

        window.claimDefect = function() {
            let index = document.getElementById('defectItem').value;
            let shop = document.getElementById('defectShop').value;
            let qty = parseInt(document.getElementById('defectQty').value) || 0;

            if(index === "" || qty <= 0) { alert("Sahi Details Daalein!"); return; }

            let item = inventory[index];
            if(shop === "Petrol Pump") {
                item.pp = Math.max(0, parseInt(item.pp || 0) - qty);
            } else {
                item.kp = Math.max(0, parseInt(item.kp || 0) - qty);
            }

            set(ref(db, 'inventory/' + index), item).then(() => {
                alert("🛑 Defect Registered and Stock Updated!");
                document.getElementById('defectQty').value = "";
            });
        }

        window.transferStock = function() {
            let index = document.getElementById('transferItem').value;
            let dir = document.getElementById('transferDir').value;
            let qty = parseInt(document.getElementById('transferQty').value) || 0;

            if(index === "" || qty <= 0) { alert("Sahi Quantity Daalein!"); return; }

            let item = inventory[index];
            if(dir === "P2K") {
                if(item.pp < qty) { alert("Petrol Pump par itna maal nahi hai!"); return; }
                item.pp = parseInt(item.pp) - qty;
                item.kp = parseInt(item.kp) + qty;
            } else {
                if(item.kp < qty) { alert("Khusboo Parking par itna maal nahi hai!"); return; }
                item.kp = parseInt(item.kp) - qty;
                item.pp = parseInt(item.pp) + qty;
            }

            set(ref(db, 'inventory/' + index), item).then(() => {
                alert("🔄 Maal transfer successfully done!");
                document.getElementById('transferQty').value = "";
            });
        }

        window.updateLeaderboard = function() {
            let r1n = document.getElementById('r1Name').value.trim();
            let r1p = document.getElementById('r1Pic').value.trim();
            let r2n = document.getElementById('r2Name').value.trim();
            let r2p = document.getElementById('r2Pic').value.trim();

            if(r1n) leaderboard.r1.name = r1n;
            if(r1p) leaderboard.r1.img = r1p;
            if(r2n) leaderboard.r2.name = r2n;
            if(r2p) leaderboard.r2.img = r2p;

            set(ref(db, 'leaderboard'), leaderboard).then(() => { alert("🏆 Leaderboard Updated!"); });
        }

        window.updatePasswords = function() {
            let appP = document.getElementById('chgAppPass').value.trim();
            let admP = document.getElementById('chgAdminPass').value.trim();

            if(appP) settings.appPin = appP;
            if(admP) settings.adminPin = admP;

            set(ref(db, 'settings'), settings).then(() => { alert("🔑 Passwords Successfully updated on Firebase!"); });
        }

        function populateAdminDropdowns() {
            const delSel = document.getElementById('deleteItemSelect');
            const defSel = document.getElementById('defectItem');
            const traSel = document.getElementById('transferItem');

            delSel.innerHTML = ""; defSel.innerHTML = ""; traSel.innerHTML = "";

            inventory.forEach((item, index) => {
                if(!item) return;
                let opt = `<option value="${index}">${item.name}</option>`;
                delSel.innerHTML += opt
