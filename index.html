<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tracker by Ayush Anand</title>
    
    <!-- Firebase SDKs (Compat Version for simplicity) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        .upload-box { border: 1px solid #ccc; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 20px; margin-top: 15px; cursor: pointer; border-radius: 5px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div class="upload-box">
        <h2>TyreXpert - Live PUC Capture</h2>
        
        <!-- capture="environment" forces the rear camera on mobile phones -->
        <label><b>1. Capture Vehicle Photo:</b></label><br><br>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" />
        
        <br><br>
        <b>2. Upload Data:</b><br>
        <button id="uploadBtn" onclick="captureAndUpload()">Submit Record</button>
        
        <p id="status" style="color: blue; font-weight: bold;"></p>
    </div>

    <script>
        // 1. Firebase Configuration (Apne Firebase console se copy karke yahan dalein)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Firebase Initialize karein
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        function captureAndUpload() {
            const fileInput = document.getElementById('cameraInput');
            const statusText = document.getElementById('status');

            if (fileInput.files.length === 0) {
                alert("Please capture a photo first!");
                return;
            }

            const file = fileInput.files[0];
            statusText.innerText = "Fetching exact location...";

            // 2. HTML5 API se GPS Location nikalna
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        
                        statusText.innerText = "Uploading photo to server...";
                        uploadToFirebase(file, lat, lng);
                    },
                    (error) => {
                        alert("Location access is required to proceed!");
                        statusText.innerText = "Location Error: " + error.message;
                    },
                    { enableHighAccuracy: true } // Yeh accurate GPS coordinates ensure karta hai
                );
            } else {
                alert("Geolocation is not supported by your browser.");
            }
        }

        function uploadToFirebase(file, lat, lng) {
            const statusText = document.getElementById('status');
            const fileName = "puc_images/" + Date.now() + "_" + file.name;
            const storageRef = storage.ref().child(fileName);

            // 3. Photo ko Firebase Storage mein upload karna
            storageRef.put(file).then((snapshot) => {
                return snapshot.ref.getDownloadURL();
            }).then((downloadURL) => {
                
                // 4. Firestore Database mein Image URL aur Location (Lat/Lng) save karna
                db.collection("tyrexpert_puc_logs").add({
                    imageUrl: downloadURL,
                    latitude: lat,
                    longitude: lng,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => {
                    statusText.innerText = "Upload Successful!";
                    statusText.style.color = "green";
                    document.getElementById('cameraInput').value = ""; // Form reset karne ke liye
                }).catch((error) => {
                    statusText.innerText = "Database Error: " + error.message;
                    statusText.style.color = "red";
                });
                
            }).catch((error) => {
                statusText.innerText = "Upload Failed: " + error.message;
                statusText.style.color = "red";
            });
        }
    </script>
</body>
</html>
