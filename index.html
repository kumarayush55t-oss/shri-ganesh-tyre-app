<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TyreXpert Pro AI</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #ecf0f1; --success: #27ae60; --card: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--primary); padding-bottom: 50px; }
        
        header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logo { font-size: 1.5rem; font-weight: 900; font-style: italic; }
        .logo span { color: var(--accent); }
        .admin-btn { background: var(--accent); color: white; border: none; padding: 5px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        input, select, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #bdc3c7; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .btn-green { background: var(--success); }
        .btn-red { background: var(--accent); }
        
        /* Assistant Bar */
        .assistant-bar { display: flex; gap: 10px; }
        .assistant-bar input { flex-grow: 1; margin: 0; border: 2px solid var(--accent); }
        .mic-btn { width: 50px; background: var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; margin: 0; cursor: pointer; }
        .ai-reply { background: #e8f8f5; border-left: 4px solid var(--success); padding: 10px; margin-top: 10px; display: none; font-weight: bold; color: #16a085; }
        
        /* Stock List */
        .stock-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .stock-info h4 { margin-bottom: 5px; }
        .stock-info p { font-size: 0.85rem; color: #7f8c8d; }
        .stock-qty { font-size: 1.5rem; font-weight: bold; }
        .qty-low { color: var(--accent); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .overlay-card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        
        /* Admin Section */
        #admin-panel { display: none; background: #fff3e0; border: 2px solid #f39c12; }
    </style>
</head>
<body>

    <div id="auth-screen" class="overlay">
        <div class="overlay-card">
            <h1 class="logo">Tyre<span>Xpert</span></h1>
            <p style="margin: 10px 0 20px;">Enter App Password to Access</p>
            <input type="password" id="app-pass" placeholder="Enter PIN">
            <button onclick="checkAppPassword()">Enter App</button>
        </div>
    </div>

    <div id="shop-screen" class="overlay" style="display: none;">
        <div class="overlay-card">
            <h2>Dukaan Select Karein</h2>
            <p style="margin: 10px 0 20px;">Aap abhi kis shop par hain?</p>
            <button class="btn-green" onclick="selectShop('Petrol Pump')">⛽ Petrol Pump</button>
            <button class="btn-green" style="background:#2980b9;" onclick="selectShop('Khusboo Parking')">🅿️ Khusboo Parking</button>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        <header>
            <div class="logo">Tyre<span>Xpert</span></div>
            <div id="shop-name" style="font-weight: bold; opacity: 0.8;"></div>
            <button class="admin-btn" onclick="promptAdmin()">Admin Lock</button>
        </header>

        <div class="container">
            <div class="card">
                <h3>🤖 AI Tyre Assistant</h3>
                <p style="font-size: 0.85rem; margin-bottom: 10px;">Type karein ya Mic dabayein...</p>
                <div class="assistant-bar">
                    <input type="text" id="searchInput" placeholder="e.g., 155/80 R13 tube..." oninput="searchStock()">
                    <button class="mic-btn" onclick="startMic()">🎤</button>
                </div>
                <div id="ai-reply" class="ai-reply"></div>
            </div>

            <div id="admin-panel" class="card">
                <h3>👑 Admin Controls</h3>
                
                <h4 style="margin-top: 15px;">🔄 Inter-Shop Transfer</h4>
                <div style="display: flex; gap: 5px;">
                    <select id="transferItem"></select>
                    <input type="number" id="transferQty" placeholder="Qty" style="width: 80px;">
                </div>
                <select id="transferDirection">
                    <option value="P2K">Petrol Pump -> Khusboo Parking</option>
                    <option value="K2P">Khusboo Parking -> Petrol Pump</option>
                </select>
                <button class="btn-green" onclick="transferStock()">Transfer Maal</button>

                <h4 style="margin-top: 15px;">📦 Low Stock Auto-Order</h4>
                <button onclick="whatsappSupplier()" style="background:#25D366; color:white;">Bhejo WhatsApp Order</button>
                
                <h4 style="margin-top: 15px;">🕵️ Mismatch Radar</h4>
                <button class="btn-red" onclick="checkMismatch()">Check Silent Leaks</button>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 15px;">📦 Current Stock (<span id="display-shop"></span>)</h3>
                <div id="stock-list"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. KNOWLEDGE BASE & DATABASE ---
        // Default Master Inventory with Alternatives (Knowledge Base)
        const defaultInventory = [
            { id: "T1", name: "MRF 155/80 R13 (Alto/Swift)", type: "Tyre", stock_pp: 0, stock_kp: 4, min: 5, alt: ["165/70 R13", "145/80 R13"] },
            { id: "T2", name: "Apollo 165/70 R13", type: "Tyre", stock_pp: 6, stock_kp: 2, min: 4, alt: ["155/80 R13"] },
            { id: "TB1", name: "3.00-18 Tube (Splendor)", type: "Tube", stock_pp: 3, stock_kp: 10, min: 5, alt: ["2.75-18 Tube"] },
            { id: "TB2", name: "14-Inch Heavy Tube", type: "Tube", stock_pp: 12, stock_kp: 5, min: 10, alt: ["14-Inch Normal Tube"] }
        ];

        let inventory = JSON.parse(localStorage.getItem('tyreDB')) || defaultInventory;
        let currentShop = "";
        let isAdmin = false;

        function saveDB() {
            localStorage.setItem('tyreDB', JSON.stringify(inventory));
            renderStock();
        }

        // --- 2. AUTHENTICATION & SHOP SELECT ---
        function checkAppPassword() {
            const pass = document.getElementById('app-pass').value;
            if(pass === "308913" || pass === "1") { // '1' is for quick testing
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('shop-screen').style.display = 'flex';
            } else {
                alert("❌ Galat Password!");
            }
        }

        function selectShop(shopName) {
            currentShop = shopName;
            document.getElementById('shop-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('shop-name').innerText = shopName;
            document.getElementById('display-shop').innerText = shopName;
            renderStock();
            populateTransferDropdown();
        }

        function promptAdmin() {
            if(isAdmin) {
                isAdmin = false;
                document.getElementById('admin-panel').style.display = 'none';
                alert("🔒 Admin mode locked. Aap ab Staff Mode mein hain.");
                return;
            }
            const pass = prompt("Enter Admin Password (12345):");
            if(pass === "12345" || pass === "1") {
                isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                alert("🔓 Admin mode Unlocked!");
            } else {
                alert("❌ Galat Admin Password!");
            }
        }

        // --- 3. CORE LOGIC (RENDER & SEARCH) ---
        function renderStock(filterText = "") {
            const listDiv = document.getElementById('stock-list');
            listDiv.innerHTML = "";
            let lowStockAlerts = [];

            inventory.forEach(item => {
                let stock = currentShop === 'Petrol Pump' ? item.stock_pp : item.stock_kp;
                
                // Low Stock Detection
                if(stock < item.min) lowStockAlerts.push(item.name);

                // Search Filter
                if(filterText && !item.name.toLowerCase().includes(filterText.toLowerCase())) return;

                let isLow = stock < item.min ? "qty-low" : "";
                
                listDiv.innerHTML += `
                    <div class="stock-item">
                        <div class="stock-info">
                            <h4>${item.name}</h4>
                            <p>Rack: ${item.type === 'Tyre' ? 'Neeche Wale Rack' : 'Upar Shelf'} | Min Alert: ${item.min}</p>
                        </div>
                        <div class="stock-qty ${isLow}">${stock}</div>
                    </div>
                `;
            });

            // Auto-Alert logic on top
            if(!filterText && lowStockAlerts.length > 0 && isAdmin) {
                // Telegram code can go here
                console.log("Low Stock Telegram Alert:", lowStockAlerts);
            }
        }

        // --- 4. AI ASSISTANT KNOWLEDGE BASE ---
        function searchStock() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            renderStock(query);
            
            const aiReply = document.getElementById('ai-reply');
            aiReply.style.display = "none";

            if(query.length < 3) return;

            // Magic AI Logic: Find if the searched item is out of stock
            let searchedItem = inventory.find(i => i.name.toLowerCase().includes(query));
            
            if(searchedItem) {
                let stock = currentShop === 'Petrol Pump' ? searchedItem.stock_pp : searchedItem.stock_kp;
                let otherShop = currentShop === 'Petrol Pump' ? searchedItem.stock_kp : searchedItem.stock_pp;
                let otherShopName = currentShop === 'Petrol Pump' ? 'Khusboo Parking' : 'Petrol Pump';

                if(stock === 0) {
                    let msg = `⚠️ ${searchedItem.name} aapki dukaan par khatam hai.`;
                    
                    // 1. Check other shop
                    if(otherShop > 0) {
                        msg += `<br>👉 Lekin <b>${otherShopName}</b> par <b>${otherShop} piece</b> pade hain!`;
                    }
                    
                    // 2. Check Alternatives (Knowledge Base)
                    if(searchedItem.alt.length > 0) {
                        msg += `<br>💡 <b>Customer ko wapas mat bhejo!</b> Iski jagah aap <b>${searchedItem.alt.join(" ya ")}</b> laga sakte ho. Unka stock check karo.`;
                    }
                    
                    aiReply.innerHTML = msg;
                    aiReply.style.display = "block";
                }
            }
        }

        // Voice Recognition Module
        function startMic() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) { alert("Mic is browser mein support nahi karta."); return; }
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            document.getElementById('searchInput').placeholder = "Sun raha hoon... Boliye!";
            
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('searchInput').value = text;
                searchStock();
            };
            recognition.start();
        }

        // --- 5. ADMIN TOOLS (Transfer, WA Order, Mismatch) ---
        function populateTransferDropdown() {
            const select = document.getElementById('transferItem');
            select.innerHTML = inventory.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
        }

        function transferStock() {
            if(!isAdmin) return;
            const itemId = document.getElementById('transferItem').value;
            const qty = parseInt(document.getElementById('transferQty').value);
            const dir = document.getElementById('transferDirection').value;

            if(!qty || qty <= 0) return alert("Sahi Quantity daalein!");

            let itemIndex = inventory.findIndex(i => i.id === itemId);
            
            if(dir === "P2K") {
                if(inventory[itemIndex].stock_pp < qty) return alert("Petrol Pump par itna maal nahi hai!");
                inventory[itemIndex].stock_pp -= qty;
                inventory[itemIndex].stock_kp += qty;
            } else {
                if(inventory[itemIndex].stock_kp < qty) return alert("Khusboo Parking par itna maal nahi hai!");
                inventory[itemIndex].stock_kp -= qty;
                inventory[itemIndex].stock_pp += qty;
            }

            saveDB();
            alert("✅ Maal Transfer Ho Gaya!");
        }

        function whatsappSupplier() {
            // Find items below minimum threshold
            let orderList = inventory.filter(i => (i.stock_pp + i.stock_kp) < i.min);
            if(orderList.length === 0) return alert("Sabhi items ka stock full hai!");

            let msg = "Namaste Bhai,\nMujhe in items ki requirement hai (TyreXpert):\n\n";
            orderList.forEach(i => {
                let required = i.min - (i.stock_pp + i.stock_kp) + 10; // Order 10 extra
                msg += `- ${i.name}: ${required} Piece\n`;
            });
            msg += "\nJaldi bhejwa dijiye.";

            // supplier ka number yahan daalein
            const phone = "919999999999"; 
            const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }

        function checkMismatch() {
            // Dummy logic: Usually compares Daily Sales array with actual input.
            alert("🕵️ Radar Active: Puraane Godown stock aur aaj ki entry match ho rahi hai... Koi silent leak detect nahi hua.");
        }

    </script>
</body>
</html>
