        .cfb { position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px; border-radius: 50%; background: linear-gradient(135deg, #e63946, #ff6b6b); border: 3px solid #fff; color: #fff; font-size: 2rem; cursor: pointer; box-shadow: 0 8px 30px rgba(230,57,70,0.5); z-index: 1500; animation: bb 2s infinite; display: flex; align-items: center; justify-content: center; }
        @keyframes bb { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        #cm { position: fixed; bottom: 100px; right: 25px; width: 440px; max-width: 94vw; height: 600px; max-height: 70vh; background: #fff; border-radius: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.35); z-index: 1600; display: none; flex-direction: column; overflow: hidden; }
        .ch { background: linear-gradient(135deg, #1a1a2e, #2d2d44); color: #fff; padding: 12px 15px; }

        .mc:hover { opacity: 1; }

        .cia { padding: 12px; background: #fff; display: flex; gap: 8px; border-top: 1px solid #eee; align-items: center; }

        .qrb { background: var(--lr); color: var(--red); border: 1px solid var(--red); padding: 7px 14px; border-radius: 18px; font-size: 0.75rem; cursor: pointer; font-weight: 600; white-space: nowrap; }
        .pp { max-width: 200px; max-height: 150px; border-radius: 10px; margin: 5px 0; border: 2px solid var(--red); }
        @media (max-width: 480px) {
            #cm { width: 96vw; right: 2vw; bottom: 90px; height: 65vh; }
            .cfb { bottom: 20px; right: 20px; width: 58px; height: 58px; font-size: 1.6rem; }

<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const fc = { apiKey: "AIzaSyApY09CHspm5TVxXTVvjnfB6lzwQ7nqltE", authDomain: "staff-managemant.firebaseapp.com", databaseURL: "https://staff-managemant-default-rtdb.firebaseio.com", projectId: "staff-managemant", storageBucket: "staff-managemant.firebasestorage.app", messagingSenderID: "160818771446", appId: "1:160818771446:web:e55f1bfc308c504efb03d7" };
const app = initializeApp(fc);
const db = getDatabase(app);

// ⚠️ APNI OPENROUTER API KEY YAHAN DALO
const OPENROUTER_KEY = "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";
let currentModel = "openai/gpt-4o-mini";
let chatHistory = [];
let isChatListening = false;

window.settings = { appPin: "308913", adminPin: "1234" };
window.staffList = {}; window.inventory = {}; window.currentShop = "";
window.isAdminLoggedIn = false; window.myStaffId = localStorage.getItem("tx_staff_id") || null;
window.selectedProductKey = null;

onValue(ref(db, 'settings'), (s) => { if(s.exists()) window.settings = s.val(); });
onValue(ref(db, 'staffList'), (s) => { window.staffList = s.val() || {}; renderLeaderboard(); populateAdminStaff(); });
onValue(ref(db, 'inventory'), (s) => { window.inventory = s.val() || {}; renderInventory(); populateAdminDropdowns(); });

window.onload = () => {
    if(!window.myStaffId) { document.getElementById('os').classList.remove('hidden'); document.getElementById('as2').classList.add('hidden'); }
    else { document.getElementById('as2').classList.remove('hidden'); document.getElementById('os').classList.add('hidden'); }
};

// Utility
function sanitize(s){ return s ? s.replace(/[\s\.\-]/g,'').toLowerCase() : ''; }
function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }

// Photo/Video capture
let mediaType = 'photo';
window.up = (type) => { mediaType = type; document.getElementById('mediaInput').click(); };

window.handleMedia = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
        let imgData = ev.target.result;
        if (mediaType === 'video') {
            // Extract frame from video (simplified: use first frame)
            imgData = await extractVideoFrame(file);
        }
        addUserMessage(`📸 ${mediaType==='video'?'Video':'Photo'}: <img src="${imgData}" class="pp">`);
        document.getElementById('ct2').style.display='flex';
        let reply = await analyzeMedia(imgData);
        document.getElementById('ct2').style.display='none';
        addBotMessage(reply);
        speakText(reply);
    };
    if (mediaType === 'photo') reader.readAsDataURL(file);
    else reader.readAsDataURL(file); // will be processed after extract
};

async function extractVideoFrame(file) {
    return new Promise((resolve) => {
        const video = document.createElement('video');
        video.preload = 'metadata';
        video.onloadeddata = () => {
            video.currentTime = 1;
        };
        video.onseeked = () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        video.src = URL.createObjectURL(file);
    });
}

// AI Mechanic Raju prompt
async function analyzeMedia(imgData) {
    const stockCtx = Object.entries(window.inventory).map(([k,i])=>`${i.name}: PP${i.pp||0} KP${i.kp||0}`).join('\n');
    const prompt = `You are Raju, a 45-year-old senior tyre mechanic with 25 years of experience at TyreXpert shop. You know everything about tyres, tubes, rims, punctures, side cuts, bulges, tread wear, alignment, balancing, valves (goti), and all vehicle tyre sizes. You speak Hinglish (Hindi+English mix) in a very friendly, patient manner. When you see a photo or video frame of a tyre/rim/problem, you diagnose it instantly and give a step-by-step repair guide with approximate cost in Indian Rupees. You also suggest the right products from our shop inventory.

Current shop inventory: ${stockCtx}

Now, look at this image and respond exactly as Raju would – with warmth, expertise, and practical advice. Give the problem diagnosis, step-by-step fix, cost, and safety tip.`;
    try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method:"POST",
            headers:{"Authorization":`Bearer ${OPENROUTER_KEY}`,"Content-Type":"application/json","HTTP-Referer":"https://tyrexpert.app","X-Title":"TyreXpert"},
            body:JSON.stringify({
                model: currentModel,
                messages: [{role:"system",content:prompt},{role:"user",content:[{type:"text",text:"Analyze this tyre media."},{type:"image_url",image_url:{url:imgData}}]}],
                temperature:0.7, max_tokens:400
            })
        });
        const data = await res.json();
        return data.choices?.[0]?.message?.content || "Arre bhai, photo theek se nahi dikhi. Dobara bhejo.";
    } catch(e) { return "Raju: Server down hai, baad mein try karo."; }
}

// Text query to Raju
async function askRaju(question) {
    const stockCtx = Object.entries(window.inventory).map(([k,i])=>`${i.name}: PP${i.pp||0} KP${i.kp||0}`).join('\n');
    const sysPrompt = `You are Raju, 45-year-old tyre mechanic at TyreXpert shop. Answer in Hinglish, very practical, step-by-step, with cost in ₹. Inventory: ${stockCtx}.`;
    try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method:"POST",
            headers:{"Authorization":`Bearer ${OPENROUTER_KEY}`,"Content-Type":"application/json","HTTP-Referer":"https://tyrexpert.app","X-Title":"TyreXpert"},
            body:JSON.stringify({
                model: currentModel,
                messages: [{role:"system",content:sysPrompt},{role:"user",content:question}],
                temperature:0.7, max_tokens:300
            })
        });
        const data = await res.json();
        return data.choices?.[0]?.message?.content || "Samjha nahi, phir se puchho.";
    } catch(e) { return "Raju: Abhi busy hoon, thodi der mein puchho."; }
}

window.scm = async () => {
    const input = document.getElementById('ci');
    const msg = input.value.trim();
    if(!msg) return;
    addUserMessage(msg);
    input.value = '';
    document.getElementById('ct2').style.display='flex';
    const reply = await askRaju(msg);
    document.getElementById('ct2').style.display='none';
    addBotMessage(reply);
    speakText(reply);
};

function speakText(text) {
    window.speechSynthesis.cancel();
    const clean = text.replace(/[*#₹]/g,'').replace(/\n/g,'. ').substring(0,250);
    const u = new SpeechSynthesisUtterance(clean); u.lang='hi-IN'; u.rate=1.0;
    setTimeout(()=>window.speechSynthesis.speak(u),200);
}

window.tc = () => {
    document.getElementById('cm').style.display = document.getElementById('cm').style.display==='flex'?'none':'flex';
    if(document.getElementById('cm').style.display==='flex') {
        if(chatHistory.length===0){
            const w = "नमस्ते! मैं Raju हूँ, TyreXpert का मैकेनिक। फोटो/वीडियो भेजो या पूछो – मैं स्टेप बाय स्टेप रिपेयर बताऊंगा।";
            addBotMessage(w);
            speakText(w);
        }
    }
};

function addUserMessage(t){ document.getElementById('cbb').innerHTML += `<div class="cmsg umsg">${t}</div>`; }
function addBotMessage(t){ document.getElementById('cbb').innerHTML += `<div class="cmsg bmsg">${t.replace(/\n/g,'<br>')}</div>`; }

// Voice
window.scv = () => {
    if(!('webkitSpeechRecognition' in window)) return;
    const recog = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
    recog.lang = 'hi-IN';
    if(isChatListening){ recog.stop(); isChatListening=false; return; }
    recog.start(); isChatListening=true;
    recog.onresult = e => { document.getElementById('ci').value = e.results[0][0].transcript; scm(); };
};

// ... (baki admin, stock functions same hain, maine skip kiye brevity ke liye, lekin aapke existing code ke saath merge kar lijiye)

</script>
