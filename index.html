<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Shop Manager</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; background: #f4f7f6; color: #333; }
        .header { background: #111; color: #fff; padding: 20px; text-align: center; position: relative; }
        .notification-bell { position: absolute; right: 20px; top: 20px; background: #e74c3c; padding: 5px 10px; border-radius: 50%; cursor: pointer; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .container { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; justify-content: center; }
        .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); flex: 1; min-width: 300px; max-width: 400px; }
        
        h3 { border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        
        /* Leaderboard Styles */
        .leaderboard-item { display: flex; justify-content: space-between; padding: 10px; margin: 5px 0; background: #ecf0f1; border-radius: 5px; font-weight: bold; }
        .top-staff { background: #f1c40f; color: #000; font-size: 1.1em; transform: scale(1.05); }
        
        /* Buttons */
        button { width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-whatsapp:hover { background: #1ebe57; }
        .btn-admin { background: #3498db; color: white; }
        .btn-admin:hover { background: #2980b9; }
        
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🛠️ Smart Management Dashboard</h2>
        <div class="notification-bell" onclick="showNotification()">🔔 <span id="notif-count">3</span></div>
    </div>

    <div class="container">
        
        <div class="card">
            <h3>🏆 Top Performing Staff</h3>
            <p style="font-size: 0.9em; color: #7f8c8d;">Based on tasks completed today</p>
            <div id="leaderboard">
                </div>
        </div>

        <div class="card">
            <h3>💬 Send WhatsApp to Customer</h3>
            <input type="text" id="custPhone" placeholder="Customer Phone (e.g., 919876543210)">
            <input type="text" id="custMessage" placeholder="Message (e.g., Your car is ready!)">
            <button class="btn-whatsapp" onclick="sendWhatsApp()">Send via WhatsApp API</button>
        </div>

        <div class="card">
            <h3>👑 Admin Control Panel</h3>
            <input type="text" id="broadcastMsg" placeholder="Type a global announcement...">
            <button class="btn-admin" onclick="broadcastNotification()">Broadcast to All Devices</button>
        </div>

    </div>

    <script>
        // 1. Staff Leaderboard Logic
        const staffData = [
            { name: "Rahul", score: 85 },
            { name: "Amit", score: 120 }, // Top Staff
            { name: "Suresh", score: 60 }
        ];

        function renderLeaderboard() {
            // Sort staff by score descending
            staffData.sort((a, b) => b.score - a.score);
            const leaderboardDiv = document.getElementById('leaderboard');
            leaderboardDiv.innerHTML = '';

            staffData.forEach((staff, index) => {
                let div = document.createElement('div');
                div.className = `leaderboard-item ${index === 0 ? 'top-staff' : ''}`;
                div.innerHTML = `<span>${index === 0 ? '🥇' : '👤'} ${staff.name}</span> <span>${staff.score} Pts</span>`;
                leaderboardDiv.appendChild(div);
            });
        }

        // 2. WhatsApp Trigger Logic
        function sendWhatsApp() {
            const phone = document.getElementById('custPhone').value;
            const message = document.getElementById('custMessage').value;
            if(!phone || !message) {
                alert("Please enter both phone and message!");
                return;
            }
            // Real application mein ye backend par hit karega (e.g., Twilio or Meta WhatsApp API)
            // Yahan hum direct web wa.me link use kar rahe hain demo ke liye
            const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        }

        // 3. Admin Broadcast / Push Notification Logic
        function broadcastNotification() {
            const msg = document.getElementById('broadcastMsg').value;
            if(!msg) return alert("Enter a message to broadcast!");
            
            // Real app mein ye Firebase Cloud Messaging (FCM) ya WebSockets ke through jayega
            alert(`[Admin Action Validated] Broadcasting to all active devices: "${msg}"`);
            
            // Simulate receiving notification
            setTimeout(() => {
                showNotification(`New Admin Message: ${msg}`);
                document.getElementById('notif-count').innerText = parseInt(document.getElementById('notif-count').innerText) + 1;
            }, 1000);
        }

        function showNotification(msg = "You have new unread alerts!") {
            alert(msg);
        }

        // Initialize App
        window.onload = () => {
            renderLeaderboard();
        };
    </script>
</body>
</html>
