<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tracker by Ayush Anand</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .dashboard { background: white; padding: 25px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .input-group { margin-bottom: 15px; }
        input[type="text"], select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background-color: #007bff; color: white; border: none; padding: 12px; font-size: 16px; cursor: pointer; border-radius: 5px; }
        button:hover { background-color: #0056b3; }
        .details-card { display: none; margin-top: 20px; padding: 15px; border: 1px solid #28a745; background-color: #e9f7ef; border-radius: 5px; }
        .details-card p { margin: 5px 0; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>TyreXpert Vehicle Connect</h2>
        
        <div class="input-group">
            <label><b>Vehicle Number:</b></label>
            <input type="text" id="vehicleNo" placeholder="e.g. HR13XX1234" style="text-transform: uppercase;">
        </div>

        <div class="input-group">
            <label><b>Handled By (Staff):</b></label>
            <select id="staffName">
                <option value="Laddu">Laddu</option>
                <option value="Haider">Haider</option>
                <option value="Arwaz">Arwaz</option>
                <option value="Ankit">Ankit</option>
            </select>
        </div>

        <button onclick="connectVehicle()">Connect</button>
        
        <p id="statusMsg" style="text-align: center; margin-top: 10px; font-weight: bold;"></p>

        <!-- Fetched Details Display -->
        <div class="details-card" id="vehicleDetails">
            <h3 style="color: #28a745; margin-top: 0;">Vehicle Details Found!</h3>
            <p><b>Owner Name:</b> <span id="ownerName"></span></p>
            <p><b>Model:</b> <span id="vehicleModel"></span></p>
            <p><b>Fuel Type:</b> <span id="fuelType"></span></p>
            <p><b>Last PUC Date:</b> <span id="lastPuc"></span></p>
            <button style="background-color: #28a745; margin-top: 15px;" onclick="proceedToCapture()">Proceed to Capture</button>
        </div>
    </div>

    <script>
        // 1. Firebase Configuration (Apni API keys yahan dalein)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. Connect Button Logic
        function connectVehicle() {
            const vNum = document.getElementById("vehicleNo").value.trim().toUpperCase();
            const statusMsg = document.getElementById("statusMsg");
            const detailsCard = document.getElementById("vehicleDetails");

            if(vNum === "") {
                statusMsg.innerText = "Please enter a valid vehicle number.";
                statusMsg.style.color = "red";
                return;
            }

            statusMsg.innerText = "Connecting to database...";
            statusMsg.style.color = "blue";
            detailsCard.style.display = "none";

            // Step A: Pehle apne Firebase mein check karein
            db.collection("tyrexpert_vehicles").doc(vNum).get().then((doc) => {
                if (doc.exists) {
                    // Gaadi ka data apne DB mein mil gaya
                    statusMsg.innerText = "Fetched from Smart Tracker DB!";
                    statusMsg.style.color = "green";
                    displayData(doc.data());
                } else {
                    // Step B: Agar DB mein nahi hai, toh external RTO API call karein
                    statusMsg.innerText = "Fetching from RTO API...";
                    fetchFromExternalAPI(vNum);
                }
            }).catch((error) => {
                statusMsg.innerText = "Error connecting: " + error.message;
                statusMsg.style.color = "red";
            });
        }

        // 3. Fake API Fetch (Ise aap real RTO API se replace karenge baad mein)
        function fetchFromExternalAPI(vNum) {
            // Yahan actual API fetch() lagega. Abhi ke liye hum ek dummy data use kar rahe hain
            setTimeout(() => {
                const apiResponse = {
                    owner: "Rahul Kumar",
                    model: "Maruti Suzuki Swift",
                    fuel: "Petrol",
                    last_puc: "12-10-2025"
                };
                
                document.getElementById("statusMsg").innerText = "Data fetched via API!";
                document.getElementById("statusMsg").style.color = "green";
                displayData(apiResponse);

                // Naya data apne Firebase mein save kar lein future ke liye
                saveToInternalDB(vNum, apiResponse);

            }, 1500); // 1.5 seconds ka delay dikhane ke liye
        }

        // 4. Data ko screen par dikhana
        function displayData(data) {
            document.getElementById("ownerName").innerText = data.owner;
            document.getElementById("vehicleModel").innerText = data.model;
            document.getElementById("fuelType").innerText = data.fuel;
            document.getElementById("lastPuc").innerText = data.last_puc;
            document.getElementById("vehicleDetails").style.display = "block";
        }

        // 5. Nayi gaadi ko DB mein save karna
        function saveToInternalDB(vNum, data) {
            db.collection("tyrexpert_vehicles").doc(vNum).set(data);
        }

        function proceedToCapture() {
            const staff = document.getElementById("staffName").value;
            const vNum = document.getElementById("vehicleNo").value;
            alert(`Proceeding to capture photo for ${vNum}. Handled by: ${staff}`);
            // Yahan pichle waale camera upload code ka link jod sakte hain
        }
    </script>
</body>
</html>
