function getDistance(lat1,lon1,lat2,lon2){const R=6371e3;const φ1=lat1*Math.PI/180,φ2=lat2*Math.PI/180;const Δφ=(lat2-lat1)*Math.PI/180,Δλ=(lon2-lon1)*Math.PI/180;const a=Math.sin(Δφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
window.pi2 = () => {

function renderLeaderboard(){let c=document.getElementById('lbc');if(!c)return;c.innerHTML="";Object.entries(window.staffList).map(([id,d])=>({id,...d})).sort((a,b)=>b.score-a.score).forEach((s,idx)=>{c.innerHTML+=`<div class="sc ${idx===0?'r1':''}"><span style="font-weight:bold;">${idx===0?'🏆 #1':'⭐ '+(idx+1)}</span><img src="${s.img}" class="si"><h4>${s.name}</h4><p>${s.score} pts</p></div>`;});}

function renderInventory(f=""){
    let cont=document.getElementById('slc'),lb=document.getElementById('lsb'),ll=document.getElementById('lsl');
    if(!cont)return;cont.innerHTML="";if(ll)ll.innerHTML="";
    let q=sanitize(f),hs=0,lc=0;
    Object.values(window.inventory).forEach(i=>{if((i.sold||0)>hs)hs=i.sold||0;});
    Object.entries(window.inventory).forEach(([k,i])=>{
        let mq=window.currentShop==='Petrol Pump'?parseInt(i.pp||0):parseInt(i.kp||0),oq=window.currentShop==='Petrol Pump'?parseInt(i.kp||0):parseInt(i.pp||0),os=window.currentShop==='Petrol Pump'?"खुशबू पार्किंग":"पेट्रोल पंप";
        if(mq<5&&mq>=0&&!f){lc++;ll.innerHTML+=`• ${i.name} <b>(${mq} पीस)</b><br>`;}
        if(q&&!sanitize(i.name).includes(q))return;
        let best=(i.sold>=hs&&hs>0)?'<span style="position:absolute;top:-8px;right:-8px;font-size:1.4rem;">🔥</span>':'';
        let ctrl=window.isAdminLoggedIn?`<div class="qc"><button class="qbtn qbtn-m" onclick="adj('${k}',-1)">−</button><div class="qb">${mq}</div><button class="qbtn qbtn-p" onclick="adj('${k}',1)">+</button></div>`:`<div class="qb">${mq}</div>`;
        cont.innerHTML+=`<div class="sti" style="position:relative;">${best}<div style="flex-grow:1;"><h4>${i.name}</h4>${i.alts?.length?`<p style="font-size:0.8rem;color:#777;">Alt: ${i.alts.join(", ")}</p>`:''}${mq===0&&oq>0?`<p style="color:var(--b);">👉 ${os} पर ${oq} पीस</p>`:''}</div>${ctrl}</div>`;
    });
    if(lb){lb.classList.toggle('hidden', lc===0 || f!=='');}
}

// ============ 📸 AI TREAD SCANNER ============

window.startTreadScan = () => document.getElementById('tpi').click();

window.handleTreadUpload = function(e) {
    let file = e.target.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = async (ev) => {
        let imgData = ev.target.result;
        addUserMessage(`📸 Tread Scan: <img src="${imgData}" class="pp">`);
        document.getElementById('ct2').style.display='flex';
        scrollChatBottom();
        
        let result = await analyzeTreadAI(imgData);
        document.getElementById('ct2').style.display='none';
        
        // Save history
        treadHistory.push({date: new Date().toLocaleDateString(), img: imgData, result: result});
        if(treadHistory.length > 20) treadHistory.shift();
        localStorage.setItem("treadHistory", JSON.stringify(treadHistory));
        
        let formatted = formatTreadResult(result);
        addBotMessage(formatted);
        speakText(result);
        addQuickReplies(["📸 Scan Aur", "🛠️ Puncture", "🚗 Vehicle", "📦 Stock"]);
        scrollChatBottom();
    };
    reader.readAsDataURL(file);
};

async function analyzeTreadAI(imgData) {
    const prompt = `You are a tyre tread depth analyzer. Analyze this tyre photo and provide assessment in Hinglish. Return EXACTLY in this format (keep labels in English, values in Hinglish):
Condition: [Excellent/Good/Fair/Poor/Bald]
TreadDepth: [Xmm estimate]
RemainingLife: [X km estimate]
Issues: [List issues or "None"]
WearType: [Normal/Shoulder/Center/Cupping/One-sided]
Recommendation: [Action to take]
CostEstimate: [₹XXX - ₹XXX]`;
    try {
        let res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method:"POST",
            headers:{"Authorization":`Bearer ${OPENROUTER_KEY}`,"Content-Type":"application/json","HTTP-Referer":"https://tyrexpert.app","X-Title":"TyreXpert"},
            body:JSON.stringify({
                model: currentModel,
                messages: [{role:"system",content:prompt},{role:"user",content:[{type:"text",text:"Analyze tread"},{type:"image_url",image_url:{url:imgData}}]}],
                temperature:0.3, max_tokens:250
            })
        });
        if (!res.ok) throw new Error("API Error "+res.status);
        let data = await res.json();
        return data.choices?.[0]?.message?.content || "Condition: Unknown\nTreadDepth: N/A\nRemainingLife: N/A\nIssues: Analysis failed\nWearType: N/A\nRecommendation: Try again\nCostEstimate: N/A";
    } catch(e) {
        console.error(e);
        return "Condition: Error\nTreadDepth: N/A\nRemainingLife: N/A\nIssues: API Error - Check key or internet\nWearType: N/A\nRecommendation: Retry\nCostEstimate: N/A";
    }
}

function formatTreadResult(raw) {
    let lines = raw.split('\n'), data = {};
    lines.forEach(l => { let p = l.split(': '); if(p.length>=2) data[p[0].trim()] = p.slice(1).join(': ').trim(); });
    let condEmoji = {Excellent:'🟢', Good:'🟢', Fair:'🟡', Poor:'🟠', Bald:'🔴'};
    let emoji = condEmoji[data.Condition] || '⚪';
    let depth = parseInt(data.TreadDepth) || 0;
    let barColor = depth >= 6 ? '#2ecc71' : depth >= 3 ? '#f39c12' : '#e74c3c';
    let barWidth = Math.min(100, Math.max(5, (depth/8)*100));
    return `<div class="tread-result">
        <strong>📊 AI Tread Analysis</strong><br><br>
        ${emoji} <b>Condition:</b> ${data.Condition || 'N/A'}<br>
        📏 <b>Tread Depth:</b> ${data.TreadDepth || 'N/A'}<br>
        <div class="tread-meter"><div class="tread-fill" style="width:${barWidth}%;background:${barColor};"></div></div>
        🚗 <b>Remaining Life:</b> ${data.RemainingLife || 'N/A'}<br>
        ⚠️ <b>Issues:</b> ${data.Issues || 'None'}<br>
        📐 <b>Wear Type:</b> ${data.WearType || 'N/A'}<br>
        💡 <b>Recommendation:</b> ${data.Recommendation || 'N/A'}<br>
        💰 <b>Cost Estimate:</b> ${data.CostEstimate || 'N/A'}
    </div>`;
}

window.hpu = function(e) {

    let reader = new FileReader();

        let imgData = ev.target.result;

        analyzeGeneralPhoto(imgData);
    };

async function analyzeGeneralPhoto(imgData) {
    let prompt = "You are a tyre expert. Analyze this photo and give practical repair advice in Hinglish. Include costs.";
    try {
        let res = await fetch("https://openrouter.ai/api/v1/chat/completions", { method:"POST", headers:{"Authorization":`Bearer ${OPENROUTER_KEY}`,"Content-Type":"application/json","HTTP-Referer":"https://tyrexpert.app","X-Title":"TyreXpert"}, body:JSON.stringify({model:currentModel,messages:[{role:"system",content:prompt},{role:"user",content:[{type:"text",text:"Analyze"},{type:"image_url",image_url:{url:imgData}}]}],temperature:0.7}) });
        let d = await res.json();
        let reply = d.choices?.[0]?.message?.content || "Analyze nahi hua.";
        document.getElementById('ct2').style.display='none';
        addBotMessage(reply);
        speakText(reply);
    } catch(e) { document.getElementById('ct2').style.display='none'; addBotMessage("Error."); }
}

async function callAI(msg) {
    let stockCtx=""; Object.entries(window.inventory).forEach(([k,i])=>stockCtx+=`${i.name}: PP=${i.pp||0}, KP=${i.kp||0}\n`);
    let prompt = `You are a tyre expert mechanic. Stock: ${stockCtx}. Reply in Hinglish. Be detailed, include costs. User: ${msg}`;
    try {
        let res = await fetch("https://openrouter.ai/api/v1/chat/completions", { method:"POST", headers:{"Authorization":`Bearer ${OPENROUTER_KEY}`,"Content-Type":"application/json","HTTP-Referer":"https://tyrexpert.app","X-Title":"TyreXpert"}, body:JSON.stringify({model:currentModel,messages:[{role:"system",content:prompt},{role:"user",content:msg}],temperature:0.7}) });
        let d = await res.json();
        return d.choices?.[0]?.message?.content || getOfflineReply(msg);
    } catch(e) { return getOfflineReply(msg); }
}

function getOfflineReply(msg) {
    let q = msg.toLowerCase();
    if(q.includes("stock")) {
        let all=Object.entries(window.inventory);
        return all.length? `📦 Stock:\n${all.map(([k,i])=>`• ${i.name}: PP=${i.pp||0}, KP=${i.kp||0}`).join('\n')}`:"📦 Khali.";
    }
    if(q.includes("puncture")) return "🛠️ Tubeless: Rs 50-100. Tube: Rs 200-400.";
    if(q.includes("i20")) return "i20: 175/70 R14, 185/65 R14, 195/55 R16. Tubeless. 32-34 PSI.";
    return "🔧 Puchho: puncture? i20 tyre? Stock?";
}

function speakText(text) {
    window.speechSynthesis.cancel();
    let clean = text.replace(/[*#₹🔧⚠️✅❌]/g,'').replace(/\n/g,'. ').replace(/(\d+)\/(\d+)/g,'$1 $2').substring(0,250);
    let u = new SpeechSynthesisUtterance(clean); u.lang='hi-IN'; u.rate=1.0;
    setTimeout(()=>window.speechSynthesis.speak(u),200);
}
